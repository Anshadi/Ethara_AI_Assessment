[build]
builder = "NIXPACKS"

[build.env]
# Build environment variables
CI = "false"

[deploy]
# Deployment settings
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

# Environment variables for production
[deploy.env]
JWT_SECRET = "your-production-jwt-secret-key-change-this"
JWT_EXPIRATION = "3600000"
