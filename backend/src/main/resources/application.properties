spring.application.name=task-manager-backend

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3307/taskmanagerdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=${PORT:8081}

# JWT Secret Key (Change this in production)
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnough
jwt.expiration=3600000

# CORS Configuration
cors.allowed-origins=*

# DevTools - Auto reload static resources
spring.devtools.restart.additional-paths=src/main/resources/static
spring.devtools.restart.enabled=true
