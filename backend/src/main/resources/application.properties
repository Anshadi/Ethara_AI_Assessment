spring.application.name=task-manager-backend

# Database Configuration (MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3307/taskmanagerdb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=${PORT:8081}

# JWT Secret Key (Change this in production)
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnough}
jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS Configuration
cors.allowed-origins=*

# DevTools - Auto reload static resources
spring.devtools.restart.additional-paths=src/main/resources/static
spring.devtools.restart.enabled=true
